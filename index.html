    author: "Stephen Hawking", 
    category: "علوم", 
    summary: "في هذا الكتاب الشهير، يبسط ستيفن هوكينج أعقد نظريات الفيزياء الكونية لغير المتخصصين، متناولاً أسرار الثقوب السوداء، طبيعة الزمن، وأصل الكون. ينجح هوكينج في تحويل الأسئلة الوجودية المتعلقة بنشأة الكون إلى لغة مفهومة وشيقة، مما يجعل القارئ يشعر وكأنه يطل من نافذة العلم على أسرار الخلق ذاته. الكتاب ليس مجرد سرد علمي جاف، بل هو تأمل في مدى اتساع الكون وضآلة حجمنا فيه، مع محاولة لفهم القوانين الفيزيائية الصارمة التي تحكم وجودنا بالكامل. من خلال هذا الكتاب، أدركنا أن الكون ليس مكاناً ثابتاً، بل هو كينونة ديناميكية تتغير باستمرار. القراءة فيه تحفز العقل على التساؤل عن أصلنا ومصيرنا، وتفتح آفاقاً واسعة لفهم الفضاء بعيداً عن الخرافات. هوكينج، برغم إعاقته، كان يمتلك روحاً تبحث عن الحقيقة في أقصى أطراف الوجود، وهذا ما يظهر في كل صفحة من الكتاب. إنه عمل يجمع بين روعة العلم وعمق الفلسفة، مما يجعله قراءة إلزامية لكل من يريد أن يفهم الكون الذي نعيش فيه، ويظل شاهداً على عبقرية هوكينج في تبسيط العلم للجميع." 
  },

  // --- علم نفس ---
  { 
    id: 251, 
    title: "Thinking, Fast and Slow", 
    author: "Daniel Kahneman", 
    category: "علم نفس", 
    summary: "يستعرض عالم النفس الحائز على نوبل دانيال كانيمان كيف يعمل عقلنا من خلال نظامين للتفكير: الأول سريع، تلقائي وعاطفي، والثاني بطيء، مجهد ومنطقي. يكشف الكتاب كيف نقع باستمرار في فخ التحيزات المعرفية التي تؤثر على قراراتنا اليومية في كل شيء، من الاستثمارات المالية وحتى اختياراتنا البسيطة في الحياة. قراءة هذا الكتاب تغير نظرتك تماماً لكيفية اتخاذك للقرارات، وتجعلك أكثر وعياً بالأخطاء الشائعة التي يرتكبها عقلك دون أن تشعر، مما يمنحك مهارة التفكير النقدي في أدق تفاصيل حياتك. كانيمان يقدم لنا دروساً في كيفية التغلب على هذه التحيزات من خلال التحليل الواعي والمراقبة المستمرة لأفكارنا. الكتاب هو خلاصة عقود من البحث العلمي في الاقتصاد السلوكي، وهو أداة لا تقدر بثمن لكل من يريد أن يكون أكثر عقلانية في تعامله مع نفسه ومع الآخرين. إنه كتاب تعليمي بامتياز، يجمع بين العلم والتطبيق العملي بأسلوب يسهل استيعابه، مما يجعله مرجعاً أساسياً في فهم الذكاء البشري وحدوده، ويغير طريقة تعاملنا مع تحديات الحياة اليومية بشكل جذري." 
  },
  { 
    id: 252, 
    title: "The Art of Loving", 
    author: "Erich Fromm", 
    category: "علم نفس", 
    summary: "يحلل إريك فروم الحب في هذا الكتاب كـ 'فن' يتطلب معرفة، ممارسة، ومجهوداً، وليس مجرد شعور عاطفي عابر يقع فيه الإنسان بالصدفة. يجادل فروم بأن الحب هو الإجابة الإنسانية الوحيدة على مشكلة الوجود، لكنه يتطلب نضجاً، شجاعة، وتنمية لقدراتنا على العطاء. الكتاب يتجاوز الرومانسية المبتذلة ليناقش الحب في أبعاده الأخلاقية، النفسية، والاجتماعية، موضحاً كيف أن ممارسة الحب هي السبيل لتحقيق التوازن النفسي والتحرر من الوحدة القاتلة. فروم يميز بين 'الحب كاستهلاك' و'الحب كنشاط' إبداعي، حيث يكمن جوهر الحب في العطاء لا في الأخذ. إنه كتاب ملهم يعيد تعريف علاقتنا بأنفسنا وبالآخرين من خلال التركيز على المسؤولية، الاحترام، والمعرفة. القراءة فيه هي رحلة في اكتشاف معنى أن تكون محباً صادقاً في عالم يقدس المصلحة المادية. هو عمل يربي القلب على الرحمة ويهذب العقل من الأنانية، ويظل مرجعاً أساسياً لكل من يبحث عن العمق في علاقاته الإنسانية، فهو يفتح أمامنا آفاقاً جديدة للعيش بقلب محب وخاشع وواعٍ لكل ما يدور حوله." 
  },
  { 
    id: 254, 
    title: "Man's Search for Meaning", 
    author: "Viktor Frankl", 
    category: "علم نفس", 
    summary: "يسجل فيكتور فرانكل تجربته المريرة والملهمة في معسكرات الاعتقال النازية، ومن خلالها يؤسس مدرسة 'العلاج بالمعنى'. يؤكد الكتاب أن الدافع الأساسي للإنسان ليس السعادة، بل البحث عن 'معنى' لحياته، حتى في أكثر الظروف قسوة وإيلاماً. القراءة في هذا الكتاب تجربة روحية كاشفة، حيث يثبت فرانكل أن الحرية الأخيرة للإنسان هي قدرته على اختيار موقفه تجاه أي ظرف يمر به، مهما كان مؤلماً. هو كتاب يمنح القارئ القوة اللازمة لمواجهة أزماته الخاصة، ويحثه على اكتشاف هدفه الفريد في الحياة الذي يعطيه القوة للاستمرار. الكتاب هو دعوة للعيش بمسؤولية وإخلاص تجاه الذات والآخرين. يظل هذا الكتاب مرجعاً لا يستغني عنه أي دارس للصحة النفسية، فهو يجمع بين أصالة العقيدة الإنسانية وجمال التحليل الفكري. بفضل مكانته، صار الكتاب من أهم الكتب التي تعتني بالنفس في مكتبتنا، فهو عمل خالد يحفظ للأمة تراثها الروحي في قالب ميسر ومفيد، فهو كتاب الأمل الذي ينير الطريق للمؤمن ويزيده يقيناً وعملاً بصحيح الفكر، ويجعل من المعنى رفيقاً دائماً للإنسان في كل خطوة." 
  },

  // --- تنمية ذاتية ---
  { 
    id: 255, 
    title: "The Power of Now", 
    author: "Eckhart Tolle", 
    category: "تنمية ذاتية", 
    summary: "يدعو هذا الكتاب بأسلوبه الهادئ والمباشر إلى التحرر من سجن الماضي ومن القلق تجاه المستقبل، والتركيز الكامل على 'اللحظة الحالية'. يشرح تول أن معظم آلامنا النفسية تنبع من التفكير الزائد في ما فات، ومن التخطيط الدائم لما سيأتي، ومن التعلق بهوية وهمية صنعها العقل. الكتاب يقدم تقنيات عملية للوعي واليقظة الذهنية، مما يساعد القارئ على تقليل التوتر والوصول إلى حالة من السلام الداخلي العميق. إنه كتاب موجه لمن يبحث عن السكينة والتحرر من ضجيج الأفكار الذي يعيقنا عن الاستمتاع بالحياة كما هي بالفعل. يوضح الكتاب أن الوعي بالحاضر هو الطريق الوحيد للسعادة الحقيقية. إنه عمل يربي العقل على الهدوء ويحرر القلب من عبء التوقعات. بفضل شعبيته الكبيرة، صار مرجعاً لكل من يسعى للتربية الروحية في زمن السرعة. إنه كتاب يفتح أبواب التأمل للمؤمن والمثقف على حد سواء، ويجعل من كل لحظة نعيشها فرصة للارتقاء الروحي والتعرف على حقيقة الذات في هذا الكون الفسيح، فهو دعوة للسلام الدائم في عالم لا يتوقف عن الصخب." 
  },

  // --- سياسة ---
  { 
    id: 253, 
    title: "The Prince", 
    author: "Niccolò Machiavelli", 
    category: "سياسة", 
    summary: "يُعد كتاب 'الأمير' المرجع الأشهر في الواقعية السياسية عبر التاريخ، حيث وضع ميكيافيلي فيه قواعد الحكم وإدارة السلطة كما هي في الواقع، لا كما يجب أن تكون في المثاليات الطوباوية. يحلل الكتاب ببراعة كيف يمكن للحاكم أن يحافظ على سلطته ويثبت دعائم حكمه، متجاهلاً أحياناً الأخلاق التقليدية في سبيل تحقيق استقرار الدولة ومصلحتها العليا. رغم سمعته المثيرة للجدل، يظل الكتاب تحليلاً فذاً للطبيعة البشرية ولآليات الصراع السياسي، ويقدم دروساً لا تزال تُدرس وتُطبق في دهاليز السياسة والإدارة حتى اليوم. ميكيافيلي يكتب بعين الخبير الذي شهد تقلبات عصره، مما يمنح كتابه صبغة عملية لا تغيب عنها الحكمة. القراءة فيه تجعل القارئ يدرك أن السياسة ليست مجرد خطابات، بل هي توازنات دقيقة وقرارات صعبة تتطلب دهاءً وحزماً. إنه عمل خالد يدرس في الجامعات الكبرى كنموذج للدراسة السياسية الواقعية، فهو يفتح أمامنا نافذة على الكواليس التي تُدار فيها الأمور، مما يجعله عملاً لا غنى عنه لكل باحث يريد فهم ميكانيكا السلطة بعيداً عن العواطف." 
  },

  // --- أنثروبولوجيا ---
  { 
    id: 256, 
    title: "Guns, Germs, and Steel", 
    author: "Jared Diamond", 
    category: "أنثروبولوجيا", 
    summary: "يقدم جاريد دايموند في هذا الكتاب تفسيراً علمياً مدهشاً لأسباب تفاوت الحضارات البشرية في تقدمها وقوتها عبر التاريخ، محطماً الأساطير التي تعزو ذلك إلى تفوق عرقي أو بيولوجي. الكتاب يركز على العوامل البيئية والجغرافية مثل توفر الحيوانات الأليفة، المحاصيل الزراعية القابلة للتدجين، والمناخ، وكيف أثرت هذه العوامل على تطور الأدوات والأسلحة. العمل يغير منظورك لفهم التاريخ العالمي، ويجعلك تدرك أن مصائر الأمم لم تكن محض صدفة أو عبقرية، بل نتيجة لظروف طبيعية استغلها الإنسان وتفاعل معها عبر آلاف السنين. إنه كتاب يبني وعياً تاريخياً متيناً ومبنياً على أدلة علمية رصينة. القراءة فيه تجعل القارئ يدرك الترابط بين البيئة والحضارة، وكيف أن الجغرافيا كانت ولا تزال تحدد مصير الشعوب. بفضل منهجه الاستقرائي، صار الكتاب المرجع الأول لكل من يريد فهم التفاوت الطبقي والعالمي بعيداً عن التحيزات. إنه كتاب يربي العقل على التفكير الشمولي، ويجعلك تنظر إلى العالم بعين الباحث الذي يبحث عن الأسباب الكبرى لما نراه اليوم من تباين في القوة والتقدم بين مختلف مناطق العالم." 
  },

  // --- أدب عالمي ---
  { 
    id: 257, 
    title: "Crime and Punishment", 
    author: "Fyodor Dostoevsky", 
    category: "أدب عالمي", 
    summary: "تُعد رواية الجريمة والعقاب قمة الأدب النفسي، حيث تتبع حياة 'راسكولنيكوف' الطالب الذي يرتكب جريمة قتل ليثبت لنفسه أنه 'إنسان متفوق' لا تلتزم بالقوانين الأخلاقية العادية. سرعان ما يغرق في دوامة من الندم والجنون والتحليل النفسي المرهق الذي لا يرحم. دوستويفسكي لا يحكي قصة جريمة فقط، بل يغوص في أعماق النفس البشرية ويكشف صراع الخير والشر الدائم فيها. الكتاب هو رحلة في البحث عن الخلاص والحقيقة بعد السقوط. يترك القارئ في حالة تأمل دائم حول الأخلاق، العقاب، والقدرة على التسامح مع الذات في ظل ظروف قاسية. دوستويفسكي يثبت أن الضمير هو الحاكم الأعلى الذي لا يمكن الهروب منه. إنها تجربة قراءة تجبرك على التأمل في دوافعك الخاصة وما قد يفعله الإنسان عندما يتوه في غياهب الأفكار. عمل أدبي يبقى حياً في الذاكرة بفضل صدقه الفني وعمقه الإنساني، وهو مرجع لا غنى عنه لكل من يريد فهم الصراع الوجودي للإنسان بين المادة والروح، فهو كتاب يربي العقل ويهذب القلب، ويظل دائماً حاضراً بجماله وجلاله ومعانيه التي تحيي القلوب وتدفعها لمزيد من العمل والتقوى." 
  },

    { 
        id: 258, 
        title: "The Republic", 
        author: "Plato", 
        category: "فلسفة", 
        summary: "في هذا الحوار الفلسفي الشهير، يرسم أفلاطون ملامح 'الدولة المثالية' والعدالة في النفس البشرية. من خلال شخصية سقراط، يناقش الكتاب مفاهيم الحكم، والتربية، والفن، والفرق بين عالم الظلال وعالم الحقيقة. إنها قراءة تأسيسية لكل الفكر الغربي، حيث تطرح تساؤلات حول ما الذي يجعل مجتمعاً ما عادلاً، وهل الفيلسوف هو الأحق بالحكم؟ الكتاب ممتع في أسلوب الحوار، وعميق في أفكاره السياسية والفلسفية. يتجاوز الكتاب كونه مجرد نظرية سياسية، ليصبح دراسة في كيفية بناء الإنسان لنفسه ومجتمعه، ويظل مرجعاً أساسياً لكل من يسعى لفهم جذور الديمقراطية والعدالة. الأفكار المطروحة حول 'كهف أفلاطون' لا تزال ذات صلة وثيقة بمشاكلنا المعاصرة في التمييز بين الحقيقة والتزييف، مما يجعلها قراءة لا غنى عنها لكل مفكر." 
    },
    { 
        id: 259, 
        title: "Walden", 
        author: "Henry David Thoreau", 
        category: "أدب الطبيعة", 
        summary: "يسجل ثورو تجربته الفريدة في العيش بتبسيط شديد في كوخ خشبي بجوار بحيرة 'والدن'، بعيداً عن صخب المجتمع والمادية. الكتاب هو صرخة من أجل الحرية الفردية، التناغم مع الطبيعة، والعيش بوعي. ثورو يكتب لغة شاعرية تحث القارئ على مراجعة نمط حياته، والتخلص من الكماليات الزائدة للتركيز على الجوهر. الكتاب دعوة للتأمل في قيمة الوقت والعمل، وهو مثالي لأي شخص يشعر بالاختناق في عالم التكنولوجيا المزدحم والمضغوط. من خلال وصفه الدقيق للفصول وتغيرات الطبيعة، يعلمنا ثورو كيف نجد الغنى في البساطة، وأن النجاح الحقيقي ليس في جمع المال، بل في امتلاك الوقت للعيش بصدق مع الذات ومع العالم المحيط، مما يجعله عملاً ملهماً لكل الباحثين عن الطمأنينة." 
    },
    { 
        id: 260, 
        title: "The Interpretation of Dreams", 
        author: "Sigmund Freud", 
        category: "علم نفس", 
        summary: "هذا الكتاب يمثل الانطلاقة الفعلية لتحليل النفس، حيث يرى فرويد أن الأحلام هي الطريق الملكي لفهم العقل الباطن والرغبات المكبوتة. الكتاب يحلل الآليات التي يستخدمها العقل لتشفير رغباتنا في رموز الأحلام المعقدة. على الرغم من أن بعض نظرياته خضعت للنقاش والنقد المستمر، إلا أن تأثير هذا العمل على الثقافة، الطب النفسي، والأدب لا يمكن إنكاره. القراءة فيه تجعلك تنظر إلى نفسك وإلى خيالاتك الليلية بعين المحلل الباحث عن الروابط الخفية التي تشكل شخصيتك وتدير سلوكك اليومي. يفتح الكتاب آفاقاً جديدة لفهم طبيعة الإنسان التي تتجاوز الوعي الظاهري، مؤكداً أن ما نحلم به ليس عشوائياً، بل هو رسائل من أعماقنا التي نحاول التغاضي عنها في يقظتنا، مما يجعله تجربة استكشافية للذات لا تُنسى." 
    },
    { 
        id: 261, 
        title: "Invisible Cities", 
        author: "Italo Calvino", 
        category: "أدب وفلسفة", 
        summary: "كتاب ساحر يتألف من وصف خيالي لمدن غريبة يصفها 'ماركو بولو' للإمبراطور 'قوبلاي خان'. كل مدينة في الكتاب تمثل جانباً من جوانب الذاكرة، الرغبة، الموت، أو الوقت. كتاب يجمع بين الشعر والفلسفة، حيث يجعلك كاليفينو تتساءل عن طبيعة المدن التي نعيش فيها وعلاقتنا بالمكان. إنه عمل أدبي تجريبي يتطلب تأملاً هادئاً، ويفتح أبواب الخيال واسعة أمام القارئ ليفكر في المدن ليس كأبنية من حجر، بل كحالات شعورية وذهنية عميقة. من خلال هذه المدن المتخيلة، نستكشف طبيعة الإنسانية وتوقها الدائم لاكتشاف الجديد، وكيف أن ذكرياتنا هي التي تبني مدننا الخاصة. الأسلوب الأدبي الفائق الجمال يجعل من قراءة كل فصل تجربة بصرية وفكرية تترك أثراً طويل الأمد، وتدعونا لإعادة النظر في عالمنا بعيون أكثر إدراكاً لجمال التفاصيل." 
    },
    { 
        id: 262, 
        title: "The Art of War", 
        author: "Sun Tzu", 
        category: "استراتيجية", 
        summary: "على الرغم من كونه أقدم دليل عسكري، إلا أن نصائح سون تزو أصبحت مبادئ استراتيجية تستخدم في الأعمال، الرياضة، والسياسة وحتى العلاقات الشخصية. المبدأ الأساسي هو الانتصار دون خوض الحرب، أو تحقيق الهدف بأقل قدر ممكن من التكلفة والجهد. الكتاب يركز على الخداع، والسرعة، والذكاء في فهم الخصم قبل فهم النفس. بساطة اللغة وقوة الحكمة تجعل منه كتاباً لا غنى عنه لمن يسعى لتحقيق أهدافه في بيئة تنافسية، محولاً الصراع إلى لعبة ذهنية قائمة على التخطيط والتبصر بدلاً من القوة الغاشمة. من خلال دراسة قوانين سون تزو، يتعلم القارئ أن أعظم الانتصارات هي التي تتحقق قبل بدء المعركة، وذلك بفضل الإعداد الجيد، وفهم بيئة العمل، والقدرة على التكيف مع المتغيرات بسرعة ومرونة فائقة." 
    },
    { 
        id: 263, 
        title: "The Prophet", 
        author: "Khalil Gibran", 
        category: "أدب وحكمة", 
        summary: "مجموعة من النصوص الشعرية والحكم التي تدور حول تساؤلات الحياة الكبرى: الحب، العمل، الزواج، الأطفال، الموت، والحرية. جبران يكتب بلغة روحية راقية تلمس كل إنسان بغض النظر عن خلفيته الثقافية. الكتاب ليس مجرد نص أدبي، بل هو دليل روحي ومصدر إلهام دائم للسلام الداخلي في عالم مضطرب. أسلوب جبران المليء بالصور البلاغية والعمق الفلسفي يجعل من الكتاب تجربة قراءة مهدئة، تعيد ترتيب الأولويات في قلب الإنسان وتذكره بقيم المحبة والتعاطف. من خلال كلمات 'المصطفى'، نجد إجابات بسيطة وعميقة في آن واحد عن تعقيدات وجودنا اليومي، مما يحول الكتاب إلى رفيق دائم يعود إليه القارئ كلما شعر بالحاجة إلى العودة لجوهر الروح وبساطة الحقيقة التي غالباً ما نغفل عنها في زحمة الحياة المادية." 
    },
    { 
        id: 264, 
        title: "A Room of One's Own", 
        author: "Virginia Woolf", 
        category: "نقد أدبي", 
        summary: "في هذا المقال الطويل، تطرح فرجينيا وولف قضية حرية الإبداع للمرأة، معتبرة أن 'امتلاك غرفة خاصة ومالاً' هما شرطان أساسيان لأي كاتبة لكي تبدع وتنتج أدباً خالداً. الكتاب هو نقد أدبي واجتماعي عميق، يحلل كيف أن التاريخ الأدبي قام بتهميش أو إقصاء المرأة لقرون طويلة، وحرمها من الفرص المتاحة للرجال. بأسلوبها السردي المميز والذكي، تقدم وولف رؤية ثاقبة حول دور المرأة في الثقافة، مما يجعله نصاً تأسيسياً في الأدب النسوي والفكر النقدي الذي يدافع عن حق الجميع في التعبير. هذا العمل لا يدافع فقط عن حقوق النساء في الكتابة، بل يفتح نقاشاً أوسع حول الشروط المادية والثقافية الضرورية للإبداع البشري بشكل عام، ويظل شاهداً على عبقرية وولف في تحليل التداخل بين الاقتصاد، والمجتمع، والفن." 
    },
    { 
        id: 265, 
        title: "Essays", 
        author: "Michel de Montaigne", 
        category: "فلسفة وأدب", 
        summary: "يعتبر مونتاني مخترع فن 'المقال'. في مقالاته، يناقش كل شيء من الصداقة إلى الخوف من الموت، دائماً بروح شكوكية متواضعة ومتسائلة. الكتاب عبارة عن رحلة داخل عقل كاتب يكتب عن نفسه ليحاول فهم العالم والناس من حوله. قراءته تشعرك بأنك تجلس مع صديق حكيم، منفتح العقل، ومحب للحياة بكل تفاصيلها المتناقضة. مقالاته هي احتفاء بالذات الإنسانية في كل حالاتها، وهي قراءة ممتعة وغير متكلفة تترك القارئ دائماً مع رؤية أكثر رحابة وتسامحاً تجاه طبيعة البشر. من خلال اعترافاته وتأملاته، يعلمنا مونتاني أن الشك هو بداية الحكمة، وأن الاعتراف بجهلنا هو أول خطوة نحو التعلم المستمر، مما يجعل مقالاته عملاً أدبياً متجدداً يظل قادراً على مخاطبة عقل وقلب القارئ في كل العصور." 
    },
    { 
        id: 266, 
        title: "Beyond Good and Evil", 
        author: "Friedrich Nietzsche", 
        category: "فلسفة", 
        summary: "يواصل نيتشه في هذا الكتاب هجومه الشرس على القيم التقليدية والأخلاق المسيحية، داعياً إلى إعادة تقييم كل القيم السائدة. يحلل نيتشه الطبيعة البشرية بعمق، ويستكشف الجوانب النفسية الدفينة خلف معتقداتنا وأفكارنا. الكتاب يتحدى القارئ ليواجه الحقيقة دون غطاء أو تجميل، ويحثه على خلق قيمه الخاصة بعيداً عن عقلية القطيع التي يفرضها المجتمع. بأسلوبه اللاذع والمفاجئ، يترك نيتشه القارئ في مواجهة صعبة ومثيرة مع أفكاره الخاصة، مما يجعله كتاباً لا يُقرأ ببرود، بل يتطلب شجاعة فكرية لمواجهة تحديات الفلسفة الوجودية. من خلال نقد الأخلاق التقليدية، يسعى نيتشه لتحرير الإنسان من الأوهام، مشجعاً إياه على احتضان قوة إرادته والعيش بشجاعة وحرية، حتى لو كان ذلك يعني الوقوف وحيداً ضد تيارات الفكر السائد، وهو ما يجعل هذا الكتاب مرجعاً أساسياً لكل متمرد فكري." 
    },
    { 
        id: 267, 
        title: "The Varieties of Religious Experience", 
        author: "William James", 
        category: "فلسفة ودين", 
        summary: "يدرس ويليام جيمس الظاهرة الدينية ليس كعقيدة أو مذهب، بل كتجربة نفسية وروحية عميقة يعيشها الفرد. الكتاب يغوص في أعماق حالات الإلهام، التوبة، والاتحاد الروحي بالكون، محاولاً فهم كيف تؤثر هذه التجارب على شخصية الفرد ومساره في الحياة. عمل جيمس يتميز بأسلوب علمي ومنفتح، بعيداً عن التعصب أو الانحياز لأي مؤسسة دينية. هو قراءة ضرورية لمن يهتم بفهم الأبعاد الروحية في حياة البشر، مركزاً على التنوع المذهل والعميق لتجربة الإنسان مع المقدسات. يثبت جيمس أن الدين في جوهره تجربة ذاتية فريدة، ويقدم تحليلًا نفسيًا رائعًا يربط بين العلم والروحانية، مما يجعل الكتاب عملاً جسريًا يجمع بين العقلانية والتدين الفطري، ويدعو القارئ لاحترام التجربة الشخصية لكل فرد في بحثه عن المعنى." 
    },
    { 
        id: 268, 
        title: "The Elements of Style", 
        author: "William Strunk Jr. & E.B. White", 
        category: "أدب ولغة", 
        summary: "رغم صغر حجمه، يعتبر هذا الكتاب المرجع الأهم لأي شخص يرغب في تحسين كتابته باللغة الإنجليزية وتطوير مهاراته التعبيرية. الكتاب لا يقدم قواعد نحوية جافة فقط، بل يقدم فلسفة للكتابة الواضحة، الموجزة، والقوية. يقدم نصائح عملية ومباشرة حول كيفية اختيار الكلمات بدقة، بناء الجمل بطريقة فعالة، وتجنب الحشو غير الضروري. هو دليل عملي لا غنى عنه للطلاب، الكتاب، والصحفيين الذين يطمحون للتميز. القراءة فيه تجعل كتابتك أكثر أناقة وفعالية، مما يساعدك في نقل أفكارك للقارئ بوضوح ودقة عالية لا تترك مجالاً للغموض. إنه كتاب يعلمك أن الجمال يكمن في الاختصار، وأن الكتابة ليست مجرد ترتيب كلمات، بل هي هندسة للفكر تهدف إلى إيصال الرسالة بأقوى وأوضح صورة ممكنة." 
    },
    { 
        id: 269, 
        title: "The Diary of a Young Girl", 
        author: "Anne Frank", 
        category: "سيرة ذاتية", 
        summary: "يعد هذا الكتاب توثيقاً إنسانياً مؤثراً جداً ليوميات فتاة يهودية اختبأت مع عائلتها من النازيين خلال الحرب العالمية الثانية. يوميات آن فرانك ليست مجرد سجل تاريخي للأحداث المأساوية، بل هي تجسيد لنضوج فتاة في ظروف مستحيلة، مليئة بالأمل، الرغبة في الحياة، والتأمل العميق في الطبيعة البشرية. الكتاب يلمس قلب كل من يقرأه، مذكراً إيانا بقيمة الحرية وبشاعة الكراهية والظلم. هو نص إنساني خالد يعيش فيه صوت آن الذي حاولوا إسكاته لكنهم فشلوا، ليصبح صرخة عالمية ضد الاضطهاد. من خلال عينيها، نرى كيف يمكن للروح الإنسانية أن تظل مشرقة ومتمسكة بجمال الحياة رغم أحلك الظروف، مما يجعل يومياتها ليست فقط كتاباً عن الحرب، بل كتاباً عن صمود الإنسان وقدرته على الحلم في وجه الموت." 
    },
    { 
        id: 270, 
        title: "The Myth of Sisyphus", 
        author: "Albert Camus", 
        category: "فلسفة", 
        summary: "يناقش كامو هنا مفهوم 'العبث': التناقض بين رغبة الإنسان الدائمة في المعنى وعجز الكون عن توفيره. يرى كامو أن سيزيف، الذي يُحكم عليه برفع صخرة للجبل لتتدحرج للأسفل أبدياً، هو الرمز الأسمى للإنسان في مواجهة الحياة. الكتاب يطرح تساؤلاً جوهرياً: كيف نعيش في عالم لا معنى له؟ ويجيب بأن التمرد على هذا الواقع والاعتراف بالعبث هو بحد ذاته فعل حرية. الكتاب ليس سوداوياً كما قد يبدو، بل هو دعوة قوية لعيش الحياة بكل كثافة رغم عدم وجود هدف نهائي لها. كامو يعلمنا أن علينا أن نتخيل سيزيف سعيداً؛ لأن في مجهوده المستمر وحريته في رفض الاستسلام يكمن جوهر كرامتنا الإنسانية. هو عمل أدبي وفلسفي يترك القارئ مع إحساس بالمسؤولية تجاه حياته الخاصة، داعياً إياه لخلق معناه الخاص وسط عبثية الوجود." 
    },
    { 
        id: 271, 
        title: "Silent Spring", 
        author: "Rachel Carson", 
        category: "بيئة وعلوم", 
        summary: "يُعتبر هذا الكتاب الشرارة الأولى للحركة البيئية المعاصرة. كشفت راشيل كارسون من خلال أبحاثها الدقيقة عن الأثر المدمر للمبيدات الحشرية الكيميائية على الحياة البرية، وخاصة الطيور، مما أدى إلى صمت الغابات في الربيع. الكتاب غير وجهة نظر العالم تجاه الطبيعة، وجعلنا ندرك الترابط الحساس بين كل كائنات الأرض وأفعالنا. هو عمل يجمع ببراعة بين العلم الموثق والأدب الملتزم، ويظل صرخة تحذيرية لا تزال صالحة حتى اليوم حول ضرورة حماية توازن كوكبنا من العبث البشري المستمر. بفضل هذا الكتاب، بدأت الثورات الخضراء ووعي الإنسان بمسؤوليته تجاه البيئة، مما يجعله وثيقة تاريخية وعلمية لا غنى عنها لفهم التحديات المناخية والبيئية التي نواجهها حالياً، والتأكيد على أن حماية الطبيعة هي في النهاية حماية لمستقبلنا البشري." 
    },
    { 
        id: 272, 
        title: "The Hero with a Thousand Faces", 
        author: "Joseph Campbell", 
        category: "أساطير وفلسفة", 
        summary: "يكشف جوزيف كامبل في هذا الكتاب أن جميع أساطير العالم عبر العصور تشترك في 'نمط' سردي واحد وهو رحلة البطل. من الأساطير القديمة وحتى الروايات والسينما الحديثة، يمر البطل بنفس المراحل الأساسية: الرحيل، الاختبار، والعودة المظفرة. الكتاب يغوص في علم النفس التحليلي ليفهم لماذا تلامس هذه القصص أرواحنا جميعاً. هو عمل تأسيسي لكل من يريد فهم كيفية بناء القصص وتأثيرها العميق على العقل البشري، ويفتح آفاقاً جديدة لفهم لماذا نعتبر قصصنا هي المرآة التي نرى فيها أنفسنا. من خلال ربط القصص الإنسانية ببعضها، يؤكد كامبل أننا جميعاً نعيش رحلة بطل، وأن كل تحدٍ نواجهه في حياتنا ليس إلا جزءاً من تلك الملحمة الإنسانية الأزلية التي تشكل هويتنا الجماعية، مما يجعل الكتاب دليلاً لفهم الإبداع البشري وتطور الوعي." 
    },
    { 
        id: 273, 
        title: "The Great Gatsby", 
        author: "F. Scott Fitzgerald", 
        category: "أدب كلاسيكي", 
        summary: "رواية أيقونية تستكشف 'الحلم الأمريكي' خلال العشرينيات الصاخبة، حيث يطارد البطل 'جاي غاتسبي' حبه المفقود وسط عالم من البذخ الزائف والانهيار الأخلاقي. تكشف الرواية ببراعة كيف أن الطموح الجامح قد يقود إلى العزلة والدمار في مجتمع تحركه المظاهر المادية والطبقية أكثر من المشاعر الإنسانية. من خلال قصة غاتسبي، نرى تناقضات الثراء والبحث عن السعادة في مجتمع لا يقدر إلا القشور. إنها دراسة نفسية للبشر الذين يعيشون في وهم الماضي، وعن الفراغ الذي يتركه المال عندما لا يجد هدفاً حقيقياً. بأسلوب فيتزجيرالد الشاعري، تصبح الرواية رحلة في أعماق النفس البشرية التي تضحي بكل شيء في سبيل غاية قد تكون فارغة، مما يجعلها تحفة أدبية تستحق القراءة المتكررة لاكتشاف أبعادها الاجتماعية والنفسية." 
    },
    { 
        id: 274, 
        title: "The Art of Happiness", 
        author: "Dalai Lama & Howard C. Cutler", 
        category: "تنمية ذاتية", 
        summary: "حوار يجمع بين الحكمة الشرقية للداراي لاما والمنطق الغربي لعالم النفس هوارد كاتلر، ليقدما رؤية عملية حول كيفية تحقيق السعادة والهدوء النفسي كمهارة يمكن تعلمها وتدريب العقل عليها. يجادل الكتاب بأن السعادة ليست نتيجة للظروف الخارجية، بل هي حالة داخلية يمكن تطويرها بالانضباط الذاتي والرحمة. بعيداً عن السطحية، يقدم الكتاب استراتيجيات للتعامل مع المعاناة والقلق، مؤكداً أن العقل هو الأداة الأقوى لدينا. هو دليل للعيش بتوازن في عالم مليء بالضغوط الخارجية، يساعد القارئ على فهم نفسه بشكل أفضل وتحويل ردود أفعاله تجاه المصاعب. من خلال مزج العلم والروحانية، يظل الكتاب مصدراً دائماً للإلهام لمن يبحث عن طريق عملي ومجرب لتحقيق الرضا الداخلي في حياة يومية مليئة بالتحديات والمشتتات." 
    },
    { 
        id: 275, 
        title: "1984", 
        author: "George Orwell", 
        category: "خيال سياسي", 
        summary: "ديستوبيا سياسية مرعبة تصور عالماً تحت سيطرة مطلقة لنظام شمولي يراقب كل حركة وفكرة، حيث تصبح الحقيقة مجرد خيار للحزب الحاكم. تعد الرواية تحذيراً خالداً من خطورة فقدان الحرية الفردية وتزييف التاريخ، وكيف يمكن للسلطة أن تعيد تشكيل وعي الإنسان وتدمر لغته لإحكام السيطرة عليه. من خلال شخصية وينستون سميث، نرى الصراع المرير للروح البشرية في محاولة الاحتفاظ بذكائها وكرامتها ضد نظام يسعى لمسح الذاكرة الفردية. بفضل أفكار 'الأخ الأكبر' و'شرطة الفكر'، أصبحت الرواية مرجعاً ثقافياً لفهم آليات الدعاية والرقابة. إنها رحلة في عالم حيث يصبح التفكير جريمة، وتظل الرواية صرخة تحذيرية لكل الأجيال بأن الحفاظ على الحقيقة والحرية الشخصية هو أغلى ما يملكه الإنسان." 
    },
    { 
        id: 276, 
        title: "The Stranger", 
        author: "Albert Camus", 
        category: "أدب وفلسفة", 
        summary: "رواية وجودية قصيرة تتبع حياة 'ميرسو'، الرجل الذي يبدو غير مبالٍ بموت أمه أو بمصيره الخاص، حيث يغوص كامو في مفهوم العبثية من خلال بطل يرفض مسايرة التوقعات الاجتماعية. ميرسو لا يمثل الشرير، بل يمثل الإنسان الذي يرفض الكذب والتصنع، مما يجعله غريباً في عالمه الخاص، ويطرح أسئلة حول صدق الذات أمام مجتمع يقدس النفاق والأقنعة. من خلال محاكمته، نرى كيف يرفض المجتمع من يختلف عن نمطه، حتى لو كان هذا الاختلاف نابعاً من صراحة مطلقة. الرواية هي دراسة في معنى الوجود عندما تفقد كل الروابط التقليدية معناها، وتظل تجربة قراءة مؤثرة تجبر القارئ على مواجهة نفسه والتفكير في قيمه الشخصية ومدى صدقه مع ذاته في عالم يفرض علينا أدواراً لا نؤمن بها." 
    },
    { 
        id: 277, 
        title: "Zero to One", 
        author: "Peter Thiel", 
        category: "أعمال", 
        summary: "يقدم المستثمر بيتر ثيل رؤية فريدة حول ريادة الأعمال والابتكار، حيث يجادل بأن التقدم الحقيقي لا يعني التكرار بل خلق شيء جديد تماماً من 'الصفر إلى الواحد'. مع التركيز على أهمية بناء شركات تحتكر مجالها بذكاء، يرفض ثيل فكرة المنافسة التقليدية كطريق للنجاح، ويرى أن الابتكار هو السبيل الوحيد لخلق قيمة حقيقية للمستقبل. يعد الكتاب خارطة طريق لمن يريد التفكير خارج الصندوق وبناء مشاريع تغير الواقع بدلاً من مجرد منافسة الآخرين في أسواق مزدحمة. من خلال تحليل النجاح والفشل، يقدم ثيل فلسفة للأعمال تعتمد على الجرأة، التخطيط طويل الأمد، والقدرة على رؤية فرص لا يراها الآخرون، مما يجعله دليلاً أساسياً لأي رائد أعمال يسعى لصناعة مستقبل مختلف كلياً عما نعيشه اليوم." 
    },
   
    { 
        id: 278, 
        title: "Tuesdays with Morrie", 
        author: "Mitch Albom", 
        category: "سيرة ذاتية", 
        summary: "يُعد هذا الكتاب توثيقاً إنسانياً مؤثراً للغاية لدروس الحياة الأخيرة التي قدمها أستاذ جامعي مسن يدعى 'مورري شوارتز' لتلميذه السابق 'ميتش ألبوم'. في الوقت الذي كان يواجه فيه مورري مرضاً عضالاً يودي بحياته ببطء، قرر أن يجعل من أيامه الأخيرة فصلاً دراسياً مفتوحاً عن أسمى معاني الوجود. تتناول الحوارات التي دارت بينهما في أيام الثلاثاء بصدق مؤلم ومُلهم في آن واحد قضايا الحب، العمل، الأسرة، والشيخوخة. الكتاب يذكرنا في كل صفحة منه بأن الوقت هو أثمن ما نملك في هذه الحياة، وأننا غالباً ما ننشغل بالتوافه عن الجوهر. يشدد مورري على أن الشجاعة الحقيقية لا تكمن في تجنب النهايات، بل في مواجهتها بقبول وتفكر عميق في الجوهر الإنساني الذي يبقى بعد فناء الجسد. بأسلوب ميتش ألبوم البسيط والعميق، ندرك أن العلاقات الإنسانية والصدق مع الذات هما الركيزتان اللتان تبنى عليهما حياة ذات قيمة ومعنى، مهما كانت نهايتها قريبة. هو كتاب يدعوك للتوقف، لإعادة تقييم أولوياتك، ولتدرك أخيراً أن المحبة هي العملة الوحيدة التي تستحق أن نجمعها في رصيدنا."
    },
    { 
        id: 279, 
        title: "The Six Pillars of Self-Esteem", 
        author: "Nathaniel Branden", 
        category: "علم نفس", 
        summary: "يُعتبر هذا الكتاب المرجع الأهم والأكثر تأثيراً في مجال تقدير الذات، حيث يقدم 'ناثانيال براندن' رؤية علمية وعملية متكاملة حول هذا المفهوم. يحدد براندن ستة أعمدة ممارسة يعتمد عليها بناء احترام الذات، وهي: العيش بوعي، تقبل الذات، تحمل المسؤولية، التوكيد الذاتي، العيش بهدف، والنزاهة الشخصية. يؤكد المؤلف أن احترام الذات ليس مجرد شعور عابر بالرضا عن النفس، بل هو وقود أساسي للنجاح والاتزان النفسي والقدرة على مواجهة التحديات. يقدم الكتاب تمارين عملية دقيقة لكل عمود، مما يساعد القارئ على تحويل المفاهيم النظرية إلى سلوكيات يومية تعزز الوعي الذاتي. يشدد براندن على أن تقدير الذات هو مسؤولية فردية بامتياز، ولا يجب أن يرتبط أبداً بالاعتماد على مديح الآخرين أو تقديرهم. من خلال هذا الكتاب، يكتسب القارئ أدوات قوية للتحرر من عقد النقص والاعتمادية النفسية، ويبني شخصية صلبة قادرة على العيش بفعالية. إنه دليل لا غنى عنه لكل من يسعى لفهم آليات النفس البشرية، ولأولئك الذين يرغبون في بناء أساس نفسي متين يمنحهم الثقة اللازمة لتحقيق طموحاتهم المهنية والشخصية."
    },
    { 
        id: 280, 
        title: "One Hundred Years of Solitude", 
        author: "Gabriel García Márquez", 
        category: "أدب الواقعية السحرية", 
        summary: "تمثل هذه الرواية ذروة أدب الواقعية السحرية وملحمة عائلية كبرى تمتد عبر سبعة أجيال في قرية 'ماكوندو' الكولومبية المتخيلة. في هذا العمل، يذوب الواقع تماماً في الخيال والأساطير، حيث تتجلى المعجزات وكأنها أحداث يومية عادية، مما يعكس قصة العزلة الإنسانية الأبدية التي تلاحق أفراد عائلة 'بوينديا'. تُعد هذه الرواية واحدة من أهم الأعمال الأدبية في القرن العشرين، إذ استطاع ماركيز ببراعة نادرة أن يمزج التاريخ السياسي والتحولات الاجتماعية لأمريكا اللاتينية بالخوارق والرموز. الأجيال المتعاقبة في الرواية تتصارع مع القدر، الحب، الحروب، والنسيان، مما يولد شعوراً مريراً لدى القارئ بأن التاريخ البشري هو حلقة مفرغة من الأخطاء المتكررة. الأسلوب السردي الفريد الذي استخدمه ماركيز، المليء بالصور البلاغية واللغة الشاعرية، يجعل من 'ماكوندو' كوناً مصغراً يشبه واقعنا الذي نعيشه. تترك الرواية في نفس القارئ أثراً عميقاً وتساؤلات فلسفية حول معنى الوجود، العزلة التي نفرضها على أنفسنا، والارتباط الوثيق بين ماضينا ومستقبلنا. إنها قراءة تجبرك على التأمل في دورة الحياة، وتذكرنا بأن العزلة هي حالة وجودية ترافق الإنسان في كل مراحل تطوره وتجاربه."
    },
    { 
        id: 281, 
        title: "Deep Work", 
        author: "Cal Newport", 
        category: "إنتاجية", 
        summary: "في هذا الكتاب الاستثنائي، يدعو 'كال نيوبورت' القراء إلى استعادة السيطرة على عقولهم في عصر يتسم بكثرة المقاطعات الرقمية المستمرة. يجادل نيوبورت بأن القدرة على التركيز المكثف، وهو ما يسميه 'العمل العميق'، هي المهارة الأغلى والأكثر ندرة في الاقتصاد الحديث. يوضح الكتاب كيف أن التشتت الدائم بسبب وسائل التواصل الاجتماعي والبريد الإلكتروني يدمر قدرتنا على الإبداع والإنتاج ذي القيمة العالية. يقدم المؤلف استراتيجيات عملية وصارمة لتحويل نمط حياتك، مثل تخصيص فترات زمنية محددة للعمل دون أي مقاطعات، وكيفية بناء طقوس خاصة للتركيز. لا يكتفي الكتاب بتقديم نصائح للإنتاجية فحسب، بل يغوص في الأسباب النفسية التي تجعلنا نهرب إلى المهام السطحية ونخاف من مواجهة العمل العميق الصعب. إنها قراءة ضرورية لأي محترف أو طالب يسعى للتميز، لأن المخرجات الاستثنائية لا تأتي إلا من خلال غمس العقل بالكامل في مهمة واحدة دون تشتت. الكتاب هو خارطة طريق عملية لتصميم بيئة عمل تسمح لك بالوصول إلى أقصى طاقاتك الذهنية، مما يؤدي بالضرورة إلى نجاح مهني وشخصي مستدام بعيداً عن ضجيج العالم الخارجي."
    },

    { 
        id: 282, 
        title: "Tao Te Ching", 
        author: "Lao Tzu", 
        category: "فلسفة صينية", 
        summary: "يعد هذا الكتاب واحداً من أعظم النصوص الفلسفية في التاريخ الإنساني، وهو حجر الزاوية في الطاوية. يركز 'لاوتسو' في هذه النصوص القديمة على مفهوم 'التاو' أو الطريق، وهو المبدأ الكوني الذي يحكم كل شيء في الوجود. يدعو الكتاب القارئ إلى العيش بتناغم تام مع الطبيعة، والتحلي بفضائل التواضع، البساطة، وعدم المقاومة، مؤكداً أن جوهر الحكمة يكمن في 'اللين' الذي يتغلب على الصلابة. الكتاب مليء بالتناقضات الفلسفية التي تحمل في طياتها حقائق كونية عميقة حول التوازن والوجود. إنه ليس مجرد كتاب للقراءة، بل هو دليل روحي وعملي لمن يبحث عن السكينة والسلام الداخلي في ظل تعقيدات وضجيج الحياة الحديثة. يعلمنا الكتاب كيف نتوقف عن الصراع العبثي مع التيار، وكيف نجد قوتنا في الهدوء والتخلي عن الأنا، مما يجعله مرجعاً لا ينضب للحكمة لكل باحث عن الحقيقة." 
    },
    { 
        id: 283, 
        title: "Educated", 
        author: "Tara Westover", 
        category: "سيرة ذاتية", 
        summary: "تعد هذه السيرة الذاتية قصة حقيقية مذهلة وملهمة لفتاة نشأت في عائلة متطرفة ومعزولة تماماً عن المجتمع، حيث حُرمت من التعليم النظامي والرعاية الطبية. تروي تارا رحلتها الشاقة وكيف استطاعت بجهد وإرادة خارقين أن تهرب من هذا الواقع المظلم الذي فرضته عليها عائلتها، لتشق طريقها نحو أرقى الجامعات العالمية مثل كامبريدج وهارفارد. الكتاب هو تأمل قوي وعميق في قوة العلم والتعليم كأداة للتحرر وإعادة بناء الذات والوعي من الصفر. تبرز الرواية الصراع المؤلم بين الولاء للعائلة والانتماء للذات والبحث عن الحقيقة. إنها قصة عن قدرة العقل البشري على التطور وتجاوز الظروف البيئية القاسية، وكيف يمكن للعلم أن يمنح الإنسان بوصلة أخلاقية وعقلية لمواجهة العالم. الكتاب ليس فقط سرداً لذكريات مؤلمة، بل هو درس في الشجاعة والتحول الفكري، ويظل واحداً من أكثر الكتب تأثيراً في تصوير كيف يمكن للمعرفة أن تكون طوق نجاة حقيقي." 
    },
    { 
        id: 284, 
        title: "The Book of Five Rings", 
        author: "Miyamoto Musashi", 
        category: "استراتيجية", 
        summary: "هذا الكتاب هو خلاصة حكمة 'مياموتو موساشي'، أعظم مبارز في تاريخ اليابان، الذي لم يهزم في أي نزال طوال حياته. يركز الكتاب على فلسفة الاستراتيجية العميقة، التوقيت الدقيق، وكيفية فهم الخصم وتحليل نقاط ضعفه. ورغم أن أصله يعود لفن المبارزة بالسيف، إلا أن مبادئه تُطبق اليوم على كافة جوانب الحياة، من إدارة الأعمال إلى التنافس الشخصي. يعلمنا موساشي أن السلاح الحقيقي هو العقل الذي يرى كل شيء بوضوح وهدوء، دون أن تشتته العواطف أو الخوف. يشدد الكتاب على أهمية الانضباط الذهني والتخطيط الاستراتيجي كأقوى أسلحة في أي معركة. من خلال هذا العمل، يكتشف القارئ أن النجاح ليس وليد الصدفة، بل نتيجة تدريب مستمر وتطوير لقدرة المرء على القراءة الصحيحة للمواقف. إنه دليل جوهري لأي قائد أو رياضي أو مفكر يرغب في التفوق في بيئات تنافسية، حيث يظل الكتاب مرجعاً دائماً لفهم طبيعة الصراع والانتصار من خلال الوعي الكامل."

    {

        title: "Brave New World", 
        author: "Aldous Huxley", 
        category: "خيال علمي", 
        summary: "تعتبر هذه الرواية واحدة من أعمق الروايات الديستوبية التي تنبأت بمستقبل مظلم يسيطر فيه العلم والتكنولوجيا على كل تفاصيل الحياة البشرية. تصور الرواية عالماً تم فيه التحكم في البشر وراثياً وشرطياً منذ الولادة لضمان استقرار اجتماعي مطلق، حيث أصبحت اللذة الاصطناعية هي المعيار الوحيد للنجاح. يطرح هكسلي تساؤلات وجودية مقلقة حول معنى الحرية الإنسانية، وهل الراحة المفرطة والرفاهية الدائمة تبرر التخلي عن آلامنا، مشاعرنا، وحقنا في أن نكون بشراً بأخطائهم وتفردهم؟ الرواية هي صرخة تحذير من فقدان الإرادة الحرة في مجتمع تقوده التكنولوجيا التي تستهدف السيطرة على الوعي. من خلال شخصيات الرواية، نرى الصدام بين عالم 'الاستقرار المبرمج' وبين الإنسان الذي لا يزال يحتفظ بكرامته وصدقه. الكتاب يظل وثيقة تحذيرية خالدة عن مخاطر التطور العلمي الذي يفتقر للأخلاق والقيم الإنسانية، مما يجعله عملاً يزداد راهنية وأهمية مع كل تطور رقمي أو تقني نشهده في واقعنا المعاصر."

    {

    {

    { 
        id: 288, 
        title: "Flow: The Psychology of Optimal Experience", 
        author: "Mihaly Csikszentmihalyi", 
        category: "علم نفس", 
        summary: "يبحث هذا الكتاب في ظاهرة نفسية رائعة تُعرف بحالة 'التدفق'، وهي تلك الحالة التي نصل إليها عندما نندمج كلياً في نشاط ما لدرجة اختفاء الإحساس بالزمن والمكان والذات. يشرح المؤلف كيف أن الوصول إلى هذه الحالة هو المفتاح الحقيقي للسعادة والإنتاجية العالية في الحياة. يوضح الكتاب أن التدفق لا يحدث بالصدفة، بل يمكن تصميمه من خلال موازنة دقيقة بين التحديات التي نواجهها وبين مهاراتنا الشخصية. إنها رؤية عملية وعلمية حول كيفية تصميم حياتنا وأعمالنا لنعيش هذه التجربة بشكل متكرر، مما يرفع من جودة حياتنا النفسية والمهنية. يجادل المؤلف بأن السعادة ليست هدفاً خارجياً نسعى للوصول إليه، بل هي نتيجة لنمط الحياة الذي نعيشه عندما نستغل كامل قدراتنا في أعمال هادفة. الكتاب يقدم خارطة طريق لأولئك الذين يشعرون بالفراغ أو الملل، ويدعوهم لتبني تحديات جديدة تفتح أبواب الإبداع والنمو الشخصي. إنه مرجع أساسي في علم النفس الإيجابي، يساعد القارئ على فهم نفسه بشكل أفضل وتحويل أنشطته اليومية إلى تجارب مثمرة وممتعة تمنحه شعوراً بالمعنى والرضا."

        author: "Richard Dawkins", 
        category: "علوم", 
        summary: "يُعد هذا الكتاب علامة فارقة في علوم الأحياء، حيث قدم ريتشارد دوكينز منظوراً ثورياً يغير تماماً فهمنا لآليات التطور الطبيعي. يقترح دوكينز أن الجين، وليس الفرد أو النوع، هو الوحدة الأساسية للانتقاء الطبيعي، وأننا كبشر وكائنات حية لسنا سوى 'آلات بقاء' مصممة لخدمة بقاء جيناتنا عبر الأجيال. يفسر الكتاب السلوكيات البشرية والحيوانية المعقدة، مثل الإيثار والتعاون، من خلال منظور تطوري جيني بحت، بعيداً عن العواطف أو التفسيرات الميتافيزيقية. هذا الكتاب يتحدى فكرة أن الكائنات الحية هي مركز الكون، ويضعها في سياق آلية بيولوجية كونية عميقة ومذهلة. بأسلوب علمي واضح وجذاب، يفتح دوكينز أعين القارئ على الحقائق العلمية خلف أفعالنا البيولوجية، مما يجعل الكتاب عملاً أساسياً لفهم الطبيعة البشرية بعمق. رغم أنه كتاب علمي، إلا أنه مكتوب بطريقة تجعل القارئ غير المتخصص يستوعب التعقيدات المدهشة للحياة وكيف أن التطور ليس صدفة عمياء، بل هو عملية دقيقة ومحكمة. يظل الكتاب مرجعاً يثير الكثير من الجدل والتأمل حول أصل الإنسان وسبب وجوده في هذا الكون." 
    },
    { 
        id: 290, 
        title: "Letters from a Stoic", 
        author: "Seneca", 
        category: "فلسفة", 
        summary: "تعتبر هذه الرسائل الفلسفية التي كتبها سينيكا لصديقه لوسيليوس واحدة من أعظم كنوز الحكمة الرواقية التي وصلت إلينا من العصور القديمة. في هذه الرسائل، يقدم سينيكا دروساً عملية وخالدة في كيفية التعامل مع تقلبات الحياة، بما في ذلك المرض، الثروة، الفقد، والخوف من الموت. الأسلوب الذي يتبعه سينيكا مباشر وعملي، يبتعد عن التعقيدات الأكاديمية ليدخل مباشرة إلى صميم التجارب الإنسانية اليومية. الكتاب يدعونا لنتدرب على السيطرة على ذواتنا، ونبني صخرة صلبة من الاتزان الداخلي في وجه عواصف الظروف الخارجية التي لا نملك التحكم فيها. هو دليل لكل من يبحث عن كيفية عيش حياة طيبة وفاضلة وسط عالم مليء بالمشتتات والضغوط. الرسائل ليست مجرد وعظ، بل هي نصائح لصديق في لحظات ضيق، مما يجعلها قريبة من القلب ومفيدة بشكل مدهش حتى في يومنا هذا. من خلال قراءة هذه النصوص، يتعلم القارئ أن يقدر القليل، وأن يجد السعادة في الداخل بدلاً من البحث عنها في الممتلكات المادية. الكتاب لا ينضب من الحكمة، ويعد مرجعاً دائماً لمن يريد أن يبني شخصية صلبة وثابتة لا تتزعزع أمام تحديات الحياة المتغيرة." 
    },
    { 
        id: 291, 
        title: "Thinking in Systems", 
        author: "Donella Meadows", 
        category: "علوم وهندسة", 
        summary: "يقدم هذا الكتاب رؤية ثورية حول كيفية فهم العالم ومعالجة المشكلات المعقدة التي نواجهها من خلال عدسة 'نظرية النظم'. تجادل دونيلا ميدوز بأن معظم مشكلاتنا تكمن في تركيزنا على الأجزاء الصغيرة بدلاً من فهم العلاقات والتغذية الراجعة التي تربطها كمنظومة متكاملة. الكتاب هو دليل جوهري لأي قائد، مفكر، أو سياسي يطمح لإحداث تغيير حقيقي داخل الأنظمة الاقتصادية، الاجتماعية، والبيئية. من خلال تحليل 'حلقات التعقيد'، نتعلم كيف نكتشف جذور الأزمات ونحدد التدخلات التي تؤدي إلى نتائج إيجابية مستدامة، بدلاً من مجرد حلول سطحية ومؤقتة. الكتاب يعلمنا أن العالم مترابط بشكل لا يمكن تجزئته، وأن فهم ديناميكيات هذا الترابط هو مفتاح إدارة التغيير بنجاح. إنه كتاب يغير الطريقة التي تفكر بها في كل شيء، من علاقاتك الشخصية إلى التحديات العالمية مثل التغير المناخي والفقر. من خلال تقديم مفاهيم تقنية بأسلوب سهل ومفهوم، يساعد الكتاب القارئ على بناء وعي شمولي يجعله أكثر حكمة وقدرة على التعامل مع عالمٍ يزداد ترابطاً واضطراباً. إنها قراءة لا غنى عنها لمن يرغب في التفكير كمهندس للواقع ومصمم للحلول الذكية." 
    },
    { 
        id: 292, 
        title: "The 48 Laws of Power", 
        author: "Robert Greene", 
        category: "سياسة", 
        summary: "يعتبر هذا الكتاب مرجعاً مثيراً للجدل في دراسة ديناميكيات القوة والتأثير التي تحكم التفاعلات البشرية عبر التاريخ. يجمع روبرت غرين 48 قانوناً استقاها من تجارب القادة، الاستراتيجيين، والمفكرين عبر العصور، ليقدم دليلاً عملياً (وربما قاسياً) حول كيفية صعود السلم الاجتماعي والمهني. لا يحاول الكتاب تعليمنا الأخلاق، بل يهدف إلى كشف القواعد 'غير المرئية' التي تستخدمها النخب والناجحون للحفاظ على مواقعهم وتحقيق أهدافهم. يحلل غرين بجرأة كيف تعمل ديناميكيات السيطرة والنجاح، مؤكداً أن القوة هي لعبة استراتيجية مستمرة، وأن الجهل بقواعدها يجعلك ضحية لفخاخ الآخرين. الكتاب مليء بالأمثلة التاريخية التي توضح كل قانون، مما يجعله قراءة ممتعة وغنية بالدروس حول طبيعة النفس البشرية وطموحها. بينما يراه البعض دليلاً للمكيافيلية، يراه آخرون مرجعاً أساسياً لحماية النفس وفهم واقع الصراع في أماكن العمل والسياسة. إنه كتاب يدعوك لتكون أكثر وعياً وحذراً في تعاملاتك مع الآخرين، ويمنحك أدوات لتحليل المواقف بعمق لتجنب الاستغلال أو التلاعب، مما يجعله كتاباً لا غنى عنه لفهم الواقع البشري بعيداً عن المثالية الساذجة." 
    },
    { 
        id: 293, 
        title: "Quiet", 
        author: "Susan Cain", 
        category: "علم نفس", 
        summary: "في هذا الكتاب القوي والمؤثر، تدافع سوزان كاين عن قيمة الأشخاص الانطوائيين في عالم يقدس الصخب والانبساط كمعيار وحيد للنجاح. توضح الكاتبة كيف أن المجتمع الحديث، وخاصة في بيئات العمل والتعليم، يميل إلى مكافأة الشخصيات المنفتحة بينما يسيء فهم هدوء الانطوائيين. تثبت كاين، من خلال أبحاث علمية وقصص واقعية، أن الانطوائيين يمتلكون مهارات استثنائية في التفكير العميق، الإبداع، والقيادة الهادئة التي غالباً ما تساهم في تحقيق نجاحات كبيرة. تدعو كاين إلى إعادة تقييم مساهمات هؤلاء الأشخاص في بيئاتنا، مشددة على أن العالم يحتاج إلى هدوئهم بقدر ما يحتاج إلى حماس الانبساطيين. الكتاب هو دعوة لاحترام التنوع الشخصي، ويساعد الانطوائيين على فهم قوتهم الحقيقية بدلاً من محاولة التكيف مع قوالب لا تناسبهم. إنها قراءة ضرورية لكل من يشعر أنه لا يتناسب مع 'ثقافة الانفتاح' السائدة، وتعد مرجعاً لمديري الموارد البشرية والتربويين الذين يرغبون في استغلال كامل طاقات فرق عملهم. الكتاب يغير نظرة القارئ للصمت والهدوء، ويجعله يرى في الانطوائية ليس ضعفاً، بل سمة بشرية غنية بالقدرات الكامنة والمتميزة." 
    },
    { 
        id: 294, 
        title: "The Structure of Scientific Revolutions", 
        author: "Thomas Kuhn", 
        category: "فلسفة العلوم", 
        summary: "هذا الكتاب هو أحد أكثر الأعمال تأثيراً في فلسفة العلوم في القرن العشرين، حيث أحدث ثورة في كيفية فهمنا لتطور المعرفة العلمية. قدم توماس كون مفهوم 'البارادايم' (أو النموذج الفكري السائد)، وأوضح أن العلم لا يتقدم في خط مستقيم من الحقائق المتراكمة، كما كان يُعتقد سابقاً. بدلاً من ذلك، يحدث تقدم العلم من خلال قفزات ثورية وتغييرات جذرية في المفاهيم الأساسية التي تحكم العلماء في كل عصر. يفسر كون لماذا ترفض المؤسسات العلمية الحقائق الجديدة في البداية وكيف تحدث الثورات العلمية التي تعيد تشكيل فهمنا للكون. هذا العمل غيّر نظرتنا للحقائق العلمية، مؤكداً أن العلم ليس بحثاً محايداً ومجرداً عن الحقيقة فحسب، بل هو نشاط بشري يتأثر بالنموذج الفكري الذي يتبناه المجتمع العلمي. الكتاب هو نص تأسيسي لفهم كيف يتطور الفكر الإنساني عبر الزمن ولماذا تكون الأفكار الثورية صعبة التقبل في البداية. إنها قراءة عميقة ومثيرة لأي شخص مهتم بفلسفة العلوم أو كيفية حدوث التغيير في المفاهيم الإنسانية الكبرى، حيث يظل الكتاب مرجعاً لا غنى عنه لفهم لماذا نعتقد ما نعتقده اليوم." 
    },
    { 
        id: 295, 
        title: "The Diary of a Young Girl", 
        author: "Anne Frank", 
        category: "سيرة ذاتية", 
        summary: "تعتبر يوميات آن فرانك واحدة من أكثر الوثائق الإنسانية تأثيراً في التاريخ، حيث توثق تجربة فتاة يهودية اختبأت مع عائلتها من بطش النازيين خلال الحرب العالمية الثانية في أمستردام. لا تقدم هذه المذكرات فقط سجلاً تاريخياً للأحداث المأساوية، بل هي تجسيد حي لنضوج فتاة في ظروف استثنائية من الخوف، الحرمان، والانعزال. من خلال كلماتها البسيطة والصادقة، نرى صراع المراهقة وأحلامها وآمالها وسط واقع كان يهدف لإنهاء وجودها. الكتاب هو صوت خالد يعبر عن مرونة الروح الإنسانية في التشبث بالحياة، الأمل، والبحث عن الجمال والمعنى رغم أقسى درجات الظلم والاضطهاد. أصبحت مذكرات آن فرانك وثيقة عالمية تذكرنا دائماً بكرامة الفرد وبشاعة الكراهية والتعصب. قراءة هذا الكتاب ليست مجرد استعراض لتاريخ الحرب، بل هي لقاء مع روح بشرية بريئة حاولت القوى الظلامية إسكاتها لكنها فشلت، لتظل كلمات آن تصرخ في وجه الظلم وتدعو للإنسانية. إنه عمل أدبي خالد يلمس قلب كل من يقرؤه، ويظل شاهداً على أن الكلمات قادرة على العيش وتغيير الوعي الجمعي البشري إلى الأبد." 
    },

    { 
        id: 296, 
        title: "How to Win Friends and Influence People", 
        author: "Dale Carnegie", 
        category: "تنمية ذاتية", 
        summary: "يُعتبر هذا الكتاب المرجع العالمي الأول والأكثر شهرة في مجال المهارات الاجتماعية وفن التعامل مع البشر. يقدم ديل كارنيجي فيه تقنيات تبدو في ظاهرها بسيطة، لكنها تحمل في طياتها عمقاً نفسياً كبيراً لكيفية التأثير في الآخرين وكسب ودهم. يركز الكتاب بشكل جوهري على مبادئ الاحترام المتبادل، الاستماع الفعال، والتعاطف الصادق مع مشاعر واحتياجات الطرف الآخر. كارنيجي لا يعلمك كيف تتلاعب بالناس، بل كيف تحسن من شخصيتك لتبني علاقات قائمة على الثقة والتقدير، مما يجعله دليلاً لا غنى عنه لأي شخص يطمح لتحسين جودة علاقاته المهنية والشخصية. من خلال مئات القصص الواقعية، يوضح الكاتب كيف يمكن لابتسامة بسيطة أو كلمة تقدير صادقة أن تفتح أبواباً كانت مغلقة، وكيف يمكن لاحترام آراء الآخرين - حتى وإن اختلفت معهم - أن يجنبك الكثير من الصراعات غير الضرورية. إنه كتاب يغير نظرتك لكيفية التحدث والاستماع، مما يجعله بوصلة أساسية في عالمنا الذي يزداد احتياجاً للتواصل الإنساني الراقي. بفضل أسلوبه المباشر والعملي، لا يزال الكتاب يحتفظ بقيمته لأجيال متعاقبة، حيث تظل قواعده في التعامل مع البشر ثابتة لا تتغير بتغير الزمن أو التكنولوجيا." 
    },
    { 
        id: 297, 
        title: "Thinking, Fast and Slow", 
        author: "Daniel Kahneman", 
        category: "علم نفس", 
        summary: "يقدم عالم النفس والاقتصاد الحائز على جائزة نوبل، دانيال كانيمان، في هذا الكتاب دراسة شاملة ومعمقة لنظامي التفكير اللذين يحكمان عقولنا. يوضح كانيمان أننا نمتلك 'النظام الأول' السريع، البديهي، والعاطفي، و'النظام الثاني' البطيء، المنطقي، والتحليلي. يكمن صلب المشكلة - وفقاً للكتاب - في التداخل المستمر بين هذين النظامين، مما يقودنا في كثير من الأحيان إلى الوقوع في أخطاء إدراكية وتحيزات معرفية عميقة تؤثر بشكل مباشر على اتخاذنا لأهم قرارات الحياة. سواء تعلق الأمر بإدارة أموالك، اختيار شريك حياتك، أو حتى تقييم مواقف العمل، يوضح كانيمان كيف يمكن لعقولنا أن تخدعنا بسهولة عبر اختصارات ذهنية تبدو منطقية لكنها مضللة. الكتاب ليس مجرد نظرية جافة، بل هو خارطة طريق تفصيلية تمنحك وعياً أكبر بكيفية عمل عقلك، وتدربك على تفعيل 'النظام الثاني' لتجنب الفخاخ الذهنية الشائعة. من خلال استعراض تجارب علمية دقيقة، يضعنا كانيمان أمام مرآة تعكس نقاط ضعفنا المعرفية، مما يدفعنا للتفكير بوعي أكبر وحذر في كل خطوة نتخذها. إنها قراءة ضرورية لكل من يرغب في فهم لماذا نتصرف أحياناً بشكل غير عقلاني، وكيف يمكننا تحسين دقة أحكامنا في عالم مليء بالمعلومات المضللة والخيارات المعقدة." 
    },
    { 
        id: 301, title: "طوق الحمامة في الألفة والألاف", author: "ابن حزم الأندلسي", category: "أدب وفلسفة", summary: "يُعد هذا الكتاب أيقونة التراث العربي في تحليل العاطفة الإنسانية، حيث يعتبر أشهر ما كُتب قديماً عن ماهية الحب وأعراضه وأقسامه المختلفة. يمزج ابن حزم الأندلسي بين التحليل النفسي الدقيق للحب كحالة إنسانية وبين القصص الواقعية التي عايشها في المجتمع الأندلسي المتطور. لا يقدم ابن حزم الحب كقصة شاعرية فقط، بل يدرسه كظاهرة اجتماعية ونفسية متكاملة، متناولاً علامات المحب، أنواع الحب، أثر الفراق والوصل، وموقف المجتمع من العشاق. يتميز الكتاب بأسلوبه الأدبي الرصين والعميق، مما يجعله دراسة رائدة سبقت عصرها في فهم تعقيدات القلب البشري وتقلبات العواطف. بالرغم من مرور قرون على تأليفه، لا يزال 'طوق الحمامة' ملهماً لكل من يسعى لفهم الحب بعيداً عن الرومانسية السطحية، حيث يضع القارئ أمام حقيقة أن المشاعر الإنسانية تظل ثابتة ومستمرة رغم تغير الزمان والمكان. إنه عمل أدبي وفلسفي رفيع المستوى يجمع بين رقة العبارة وعمق الفكرة، مما يجعله كتاباً لا يُقرأ لمرة واحدة فحسب، بل يُتأمل فيه كمصدر للحكمة وفهم طبيعة العلاقة بين البشر والعاطفة في كل العصور." 
    },
    { 
        id: 302, title: "عالم الغد", author: "مصطفى محمود", category: "فكر وعلم", summary: "في هذا الكتاب، يتأمل الدكتور مصطفى محمود في آفاق العلم الحديث ومستقبل البشرية المذهل في ظل التطور التكنولوجي المتسارع. يطرح الكاتب رؤيته الفلسفية التي تسعى للربط ببراعة بين الحقائق العلمية المادية وبين الحقائق الإيمانية الروحية، مستخدماً أسلوبه المتميز في التساؤل النقدي والنزعة الروحية التي عرف بها. يتساءل مصطفى محمود عن مصير الإنسان الذي صنع آلات تفوقه ذكاءً وقدرة، وعن مدى تأثير هذا التقدم على قيمنا وهويتنا. الكتاب يقدم رؤية استشرافية حول مستقبل الكون والشعور الإنساني تجاه الخالق في ظل الاكتشافات العلمية المعاصرة. لا ينظر الدكتور مصطفى محمود للعلم كعدو للدين، بل يراه كأداة إضافية تكشف عظمة الكون المنظم، داعياً القارئ للتفكر في الأسئلة الوجودية الكبرى. إنها رحلة فكرية تأخذك من المختبرات والمجرات إلى أعماق النفس البشرية، بحثاً عن المعنى في عالم يتغير بسرعة الضوء. بأسلوب بسيط وعميق، ينجح الكتاب في تقريب المفاهيم العلمية المعقدة مع الحفاظ على روح الحوار الفلسفي الذي يثير العقل والقلب معاً، مما يجعله مرجعاً فكرياً لكل من يسعى لفهم تحديات الإنسان في العصر الحديث."

        // دالة عرض شبكة الكتب الأساسية
        function renderBooksGrid(booksList, destinationGridId) {
            const grid = document.getElementById(destinationGridId);
            grid.innerHTML = "";

            if (booksList.length === 0) {
                grid.innerHTML = `<div class="empty-indicator">لا توجد كتب تطابق هذا البحث حالياً.. 📚</div>`;
                return;
            }

            booksList.forEach(book => {
                const isFav = userFavs.includes(book.id);
                const card = document.createElement('div');
                card.className = 'book-card-v2';
                card.onclick = () => openStandalonePage(book);

                card.innerHTML = `
                    <div class="img-container">
                        <img src="${book.cover}" alt="${book.title}" loading="lazy">
                        <div class="fav-heart" onclick="toggleFav(event, ${book.id}, '${destinationGridId}')">
                            ${isFav ? '❤️' : '🤍'}
                        </div>
                    </div>
                    <div class="info-container">
                        <div>
                            <div class="info-title" title="${book.title}">${book.title}</div>
                            <div class="info-author">${book.author}</div>
                        </div>
                        <div class="info-footer">
                            <span>${book.lang}</span>
                            <span>${book.category}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

function renderPaginationControls(
    totalItems,
    itemsPerPage,
    currentPage,
    containerId,
    onPageChange
) {

    const container = document.getElementById(containerId);

    container.innerHTML = "";

    const totalPages = Math.ceil(totalItems / itemsPerPage);

    if (totalPages <= 1) return;

    // زر السابق
    const prevBtn = document.createElement('button');

    prevBtn.className = 'page-btn';

    prevBtn.innerHTML = '←';

    prevBtn.disabled = currentPage === 1;

    prevBtn.onclick = () => {
        onPageChange(currentPage - 1);
    };

    container.appendChild(prevBtn);

    // تحديد الصفحات الظاهرة
    let pages = [];

    if (totalPages <= 7) {

        for (let i = 1; i <= totalPages; i++) {
            pages.push(i);
        }

    } else {

        pages.push(1);

        if (currentPage > 3) {
            pages.push("...");
        }

        let start = Math.max(2, currentPage - 1);

        let end = Math.min(
            totalPages - 1,
            currentPage + 1
        );

        for (let i = start; i <= end; i++) {
            pages.push(i);
        }

        if (currentPage < totalPages - 2) {
            pages.push("...");
        }

        pages.push(totalPages);
    }

    // رسم الأزرار
    pages.forEach(page => {

        if (page === "...") {

            const dots = document.createElement('span');

            dots.className = 'page-dots';

            dots.innerHTML = '...';

            container.appendChild(dots);

            return;
        }

        const btn = document.createElement('button');

        btn.className =
            `page-btn ${page === currentPage ? 'active' : ''}`;

        btn.innerHTML = page;

        btn.onclick = () => {
            onPageChange(page);
        };
        // خانة الانتقال المباشر لصفحة


        container.appendChild(btn);
        
    });

    // زر التالي
    const nextBtn = document.createElement('button');

    nextBtn.className = 'page-btn';

    nextBtn.innerHTML = '→';

    nextBtn.disabled = currentPage === totalPages;

    nextBtn.onclick = () => {
        onPageChange(currentPage + 1);
    };

    container.appendChild(nextBtn);

        // تحديث محتوى الصفحة الرئيسية بناء على الترقيم الحالي
        function updateHomeView() {
            const startIndex = (homeCurrentPage - 1) * booksPerPage;
            const endIndex = startIndex + booksPerPage;
            const paginatedBooks = currentFilteredDataset.slice(startIndex, endIndex);
            
            renderBooksGrid(paginatedBooks, 'homeGrid');
            renderPaginationControls(currentFilteredDataset.length, booksPerPage, homeCurrentPage, 'homePagination', (newPage) => {
                homeCurrentPage = newPage;
                updateHomeView();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

 function buildCategoriesUI() {

    const wrapper = document.getElementById('categoriesBoxesWrapper');

    wrapper.innerHTML = "";

    // استخراج الأقسام تلقائياً من الكتب
    const dynamicCategories = [
        "كل الأقسام",
        ...new Set(
            libraryDataset.map(book => book.category)
        )
    ];

    dynamicCategories.forEach(cat => {

        const count =
            cat === "كل الأقسام"
            ? libraryDataset.length
            : libraryDataset.filter(
                b => b.category === cat
            ).length;

        const box = document.createElement('div');

        box.className =
            `cat-box ${cat === selectedCategory ? 'active' : ''}`;

        box.onclick = () => {

            document.querySelectorAll('.cat-box')
                .forEach(b => b.classList.remove('active'));

            box.classList.add('active');

            selectedCategory = cat;

            catsCurrentPage = 1;

            filterCategoryView();
        };

        box.innerHTML = `
            <h3>${cat}</h3>
            <span>${count} كتاب</span>
        `;

        wrapper.appendChild(box);
    });

    filterCategoryView();
}

        // تحديث تصفح تابة الأقسام بالترقيم
        function filterCategoryView() {
            document.getElementById('focusedCategoryTitle').innerHTML = `الكتب التابعة لقسم [ ${selectedCategory} ] :`;
            
            const categoryBooks = selectedCategory === "كل الأقسام" ? libraryDataset : libraryDataset.filter(b => b.category === selectedCategory);
            
            const startIndex = (catsCurrentPage - 1) * booksPerPage;
            const endIndex = startIndex + booksPerPage;
            const paginatedCatsBooks = categoryBooks.slice(startIndex, endIndex);

            renderBooksGrid(paginatedCatsBooks, 'catsGrid');
            renderPaginationControls(categoryBooks.length, booksPerPage, catsCurrentPage, 'catsPagination', (newPage) => {
                catsCurrentPage = newPage;
                filterCategoryView();
                window.scrollTo({ top: 300, behavior: 'smooth' });
            });
        }

        // شريط البحث الفوري المباشر
        function runLiveSearch(e) {
            const term = e.target.value.toLowerCase().trim();
            
            currentFilteredDataset = libraryDataset.filter(b => 
                b.title.toLowerCase().includes(term) || 
                b.author.toLowerCase().includes(term) || 
                b.category.toLowerCase().includes(term)
            );

            homeCurrentPage = 1;
            catsCurrentPage = 1;
            
            updateHomeView();
            filterCategoryView();
        }

        // التنقل بين تبويبات الموقع العلويّة
        function switchNavTab(tabName) {
            previousActivePane = tabName;

            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.view-pane').forEach(pane => pane.classList.remove('active'));

            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`pane-${tabName}`).classList.add('active');

            if(tabName === 'favs') {
                const favoritesList = libraryDataset.filter(b => userFavs.includes(b.id));
                renderBooksGrid(favoritesList, 'favsGrid');
            }
        }

        // فتح الصفحة الفرعية المستقلة الكاملة للكتاب
        function openStandalonePage(book) {
            document.getElementById('whole-app-interface').style.display = 'none';

            document.getElementById('pCover').src = book.cover;
            document.getElementById('pTitle').textContent = book.title;
            document.getElementById('pAuthor').textContent = book.author;
            document.getElementById('pCat').textContent = book.category;
            document.getElementById('pLang').textContent = book.lang;
            document.getElementById('pPub').textContent = book.publisher;
            document.getElementById('pPages').textContent = `${book.year} | ${book.pages}`;
            document.getElementById('pSummary').innerHTML = book.summary;

            document.getElementById('standalone-book-page').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeStandalonePage() {
            document.getElementById('standalone-book-page').style.display = 'none';
            document.getElementById('whole-app-interface').style.display = 'block';
            switchNavTab(previousActivePane);
        }

        // نظام إضافة وحذف الكتب من المفضلة
        function toggleFav(event, id, originGridId) {
            event.stopPropagation();

            if(userFavs.includes(id)) {
                userFavs = userFavs.filter(favId => favId !== id);
            } else {
                userFavs.push(id);
            }

            localStorage.setItem('bookverse_v3_favs', JSON.stringify(userFavs));
            
            updateHomeView();
            filterCategoryView();
            renderBooksGrid(libraryDataset.filter(b => userFavs.includes(b.id)), 'favsGrid');
        }
    </script>
